<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#eef3f8" />
    <title>Maix Converter Platform</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img class="brand-mark" src="/static/sipeed.png" alt="Sipeed" />
        <div class="brand-copy">
          <h1>Maix Converter</h1>
        </div>
      </div>
      <div class="top-actions">
        <span class="support-chip" data-i18n="app.subtitle">MaixCam / MaixCam2 模型转换工作台</span>
        <div class="language-control">
          <span id="languageLabel" data-i18n="app.language">语言</span>
          <input id="languageSelect" type="hidden" value="zh-CN" />
          <span class="select-control language-select-control" id="languageSelectControl">
            <button class="select-button" id="languageSelectButton" type="button" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="languageLabel languageSelectValue">
              <span class="select-value"><strong id="languageSelectValue">中文</strong></span>
            </button>
            <span class="select-menu" id="languageSelectMenu" role="listbox" hidden>
              <button class="select-option language-option active" type="button" role="option" data-value="zh-CN" data-label="中文" aria-selected="true">
                <span><strong>中文</strong></span>
              </button>
              <button class="select-option language-option" type="button" role="option" data-value="en-US" data-label="English" aria-selected="false">
                <span><strong>English</strong></span>
              </button>
            </span>
          </span>
        </div>
        <button id="themeButton" class="ghost-button" type="button" data-i18n="actions.theme">主题</button>
        <span id="serverState" class="server-state checking" data-i18n="server.checking">API 检查中</span>
      </div>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <div class="panel-head">
          <h2 data-i18n="jobForm.title">转换任务</h2>
          <span class="pill" id="toolchainBadge">Pulsar2</span>
        </div>

        <form id="jobForm" class="job-form">
          <div class="field upload-field">
            <span data-i18n="jobForm.modelFile">模型文件</span>
            <label class="file-control" for="modelFile">
              <strong data-i18n="jobForm.modelChoose">选择模型</strong>
              <em id="modelFileHelp" data-i18n="jobForm.modelHelp">支持 .pt / .onnx</em>
            </label>
            <input id="modelFile" class="native-file" name="model" type="file" accept=".pt,.onnx" required />
          </div>

          <div class="field upload-field">
            <span data-i18n="jobForm.datasetFile">量化数据集</span>
            <label class="file-control" for="datasetFile">
              <strong data-i18n="jobForm.datasetChoose">选择数据集</strong>
              <em id="datasetFileHelp" data-i18n="jobForm.datasetHelp">上传 .zip 文件</em>
            </label>
            <input id="datasetFile" class="native-file" name="dataset" type="file" accept=".zip" required />
          </div>

          <label class="field">
            <span data-i18n="jobForm.modelName">模型名称</span>
            <input id="modelName" name="model_name" type="text" placeholder="yolo26n" />
          </label>

          <div class="field">
            <span data-i18n="jobForm.target">目标设备</span>
            <div class="segmented-control" role="radiogroup" aria-label="目标设备">
              <label>
                <input type="radio" name="target" value="maixcam2" checked />
                <span>
                  <strong>MaixCam2</strong>
                  <em>Pulsar2 / AX620E</em>
                </span>
              </label>
              <label>
                <input type="radio" name="target" value="maixcam" />
                <span>
                  <strong>MaixCAM / Pro</strong>
                  <em>TPU-MLIR / CV181x</em>
                </span>
              </label>
            </div>
          </div>

          <div class="field">
            <span data-i18n="jobForm.yoloVersion">YOLO 版本</span>
            <input id="yoloVersion" name="yolo_version" type="hidden" value="yolo26" />
            <span class="select-control" id="yoloSelect">
              <button class="select-button" id="yoloSelectButton" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span class="select-value">
                  <strong id="yoloSelectLabel">YOLO26</strong>
                  <em id="yoloSelectMeta">Detect</em>
                </span>
              </button>
              <span class="select-menu" id="yoloSelectMenu" role="listbox" hidden>
                <button class="select-option active" type="button" role="option" data-value="yolo26" data-label="YOLO26" data-meta="Detect" aria-selected="true">
                  <span><strong>YOLO26</strong><em>Detect</em></span>
                </button>
                <button class="select-option" type="button" role="option" data-value="yolo11" data-label="YOLO11" data-meta="Detect" aria-selected="false">
                  <span><strong>YOLO11</strong><em>Detect</em></span>
                </button>
                <button class="select-option" type="button" role="option" data-value="yolov8" data-label="YOLOv8" data-meta="Detect" aria-selected="false">
                  <span><strong>YOLOv8</strong><em>Detect</em></span>
                </button>
              </span>
            </span>
          </div>

          <div class="grid-two">
            <label class="field">
              <span data-i18n="jobForm.imagesNum">图片数量</span>
              <input id="imagesNum" name="images_num" type="number" min="1" max="5000" value="100" required />
            </label>
            <label class="field toggle-field">
              <input name="fast" type="checkbox" checked />
              <span data-i18n="jobForm.fastMode">快速模式</span>
            </label>
          </div>

          <div class="grid-two">
            <label class="field">
              <span data-i18n="jobForm.width">宽度</span>
              <input id="imgszWidth" name="imgsz_width" type="number" min="32" max="4096" step="32" value="640" required />
            </label>
            <label class="field">
              <span data-i18n="jobForm.height">高度</span>
              <input id="imgszHeight" name="imgsz_height" type="number" min="32" max="4096" step="32" value="480" required />
            </label>
          </div>

          <button id="submitButton" class="primary-button" type="submit" data-i18n="actions.startConvert">开始转换</button>
          <div class="progress" data-i18n-aria-label="upload.progressAria" aria-label="上传进度">
            <span id="uploadProgressBar"></span>
          </div>
          <p id="uploadProgressText" class="progress-text" data-i18n="upload.waiting">等待上传</p>
        </form>
      </section>

      <section class="panel monitor-panel">
        <div class="panel-head">
          <h2 data-i18n="monitor.title">任务监控</h2>
          <span id="jobStatus" class="status idle" data-i18n="status.notStarted">未开始</span>
        </div>

        <div class="job-summary">
          <div>
            <span>Job ID</span>
            <strong id="jobId">-</strong>
          </div>
          <div>
            <span data-i18n="monitor.model">模型</span>
            <strong id="jobModel">-</strong>
          </div>
          <div>
            <span data-i18n="monitor.doneAt">完成时间</span>
            <strong id="jobDone">-</strong>
          </div>
          <div>
            <span data-i18n="monitor.config">配置</span>
            <strong id="jobConfig">-</strong>
          </div>
        </div>

        <div id="stageProgress" class="stages" aria-label="Conversion progress">
          <span data-stage="prepare"><b aria-hidden="true"></b><em id="stageLabelPrepare">数据准备</em></span>
          <span data-stage="export"><b aria-hidden="true"></b><em id="stageLabelExport">ONNX 导出</em></span>
          <span data-stage="prebuild"><b aria-hidden="true"></b><em id="stageLabelPrebuild">Pulsar 配置</em></span>
          <span data-stage="convert"><b aria-hidden="true"></b><em id="stageLabelConvert">Pulsar2 编译</em></span>
          <span data-stage="package"><b aria-hidden="true"></b><em id="stageLabelPackage">AXModel 打包</em></span>
        </div>

        <p id="jobError" class="job-error" hidden></p>

        <div class="actions job-actions">
          <div class="action-group">
            <button id="refreshButton" class="secondary-button" type="button" data-i18n="actions.refresh">刷新</button>
            <button id="cancelJobButton" class="danger-button" type="button" hidden data-i18n="actions.cancel">取消任务</button>
          </div>
          <a id="downloadButton" class="download-button disabled" href="#" aria-disabled="true" data-i18n="actions.downloadResult">下载结果</a>
        </div>

        <div class="log-toolbar">
          <div class="log-actions">
            <button id="logCopyBtn" class="log-tool-button" type="button" data-i18n="actions.copyLog">复制日志</button>
            <button id="logDownloadBtn" class="log-tool-button" type="button" data-i18n="actions.downloadLog">下载日志</button>
            <button id="logClearBtn" class="log-tool-button" type="button" data-i18n="actions.clearDisplay">清空显示</button>
          </div>
          <label>
            <input id="logAutoScroll" type="checkbox" checked />
            <span data-i18n="actions.autoScroll">自动滚动</span>
          </label>
        </div>
        <pre id="logView" class="log-view" data-i18n="log.waiting">等待任务输出...</pre>
      </section>
    </main>

    <section class="jobs-section">
      <div class="jobs-head">
        <h2 data-i18n="jobs.title">最近任务</h2>
        <button id="reloadJobs" class="secondary-button" type="button" data-i18n="actions.updateList">更新列表</button>
      </div>
      <div id="jobsFilter" class="filters">
        <button class="filter active" type="button" data-filter="all" data-i18n="filter.all">全部</button>
        <button class="filter" type="button" data-filter="running" data-i18n="filter.running">运行中</button>
        <button class="filter" type="button" data-filter="success" data-i18n="filter.success">已完成</button>
        <button class="filter" type="button" data-filter="failed" data-i18n="filter.failed">失败</button>
        <button class="filter" type="button" data-filter="cancelled" data-i18n="filter.cancelled">已取消</button>
        <span id="jobsCount"></span>
      </div>
      <div id="jobsList" class="jobs-list"></div>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
